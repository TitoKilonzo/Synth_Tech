<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SynthLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { brand: { dark: '#05192D', light: '#0E2A47', accent: '#2EF2A4', } } } } }</script>
    <style>
        .pulse-icon { position: relative; }
        .pulse-icon::before, .pulse-icon::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 50%; border: 2px solid #2EF2A4; opacity: 0; z-index: -1; } 
        .pulse-icon::before { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; } 
        .pulse-icon::after { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) 1s infinite; } 
        @keyframes pulse-ring { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">
    
    <div id="header"></div>

    <div class="flex-grow flex items-center justify-center py-20 px-4 sm:px-6 lg:px-8 relative">
        <!-- Background decoration -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-brand-accent/5 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-brand-dark/5 rounded-full blur-3xl"></div>
        </div>

        <div class="max-w-5xl w-full grid md:grid-cols-5 gap-0 bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 z-10 relative">
            
            <!-- Left Side: Info -->
            <div class="md:col-span-2 bg-brand-dark text-white p-10 lg:p-12 flex flex-col justify-between relative overflow-hidden">
                <div class="absolute inset-0 bg-grid opacity-10"></div>
                
                <div class="relative z-10">
                    <h2 class="text-3xl font-bold mb-4">Let's Talk</h2>
                    <p class="text-gray-400 mb-10 leading-relaxed">Have a project in mind? We'd love to hear from you. Fill out the form and we'll get back to you shortly.</p>
                    
                    <div class="space-y-8">
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center flex-shrink-0 text-brand-accent mt-1 pulse-icon">
                                <i class="fa-solid fa-location-dot text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-white mb-1">Visit Us</h4>
                                <p class="text-sm text-gray-400">Nairobi, Kenya</p>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-4">
                            <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center flex-shrink-0 text-brand-accent">
                                <i class="fa-solid fa-envelope text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-white mb-1">Email Us</h4>
                                <p class="text-sm text-gray-400">info@synthlink.tech</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative z-10 mt-auto pt-10">
                    <p class="text-sm text-gray-500 mb-4">Follow us on social media</p>
                    <div class="flex gap-4">
                        <a href="https://wa.me/254700000000" class="w-10 h-10 rounded-full bg-white/10 hover:bg-[#25D366] hover:text-white transition flex items-center justify-center"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="https://x.com/synthlinktech" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white hover:text-black transition flex items-center justify-center"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="https://linkedin.com/company/synthlinktech" class="w-10 h-10 rounded-full bg-white/10 hover:bg-[#0077b5] hover:text-white transition flex items-center justify-center"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                </div>
            </div>
            
            <!-- Right Side: Form -->
            <div class="md:col-span-3 p-10 lg:p-12 bg-white">
                <h3 class="text-2xl font-bold text-brand-dark mb-8">Send a Message</h3>
                
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Message Sent (Demo)');">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">First Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-brand-accent/50 focus:border-brand-accent outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Last Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-brand-accent/50 focus:border-brand-accent outline-none transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-brand-accent/50 focus:border-brand-accent outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Subject</label>
                        <select class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-brand-accent/50 focus:border-brand-accent outline-none transition-all cursor-pointer">
                            <option>General Inquiry</option>
                            <option>Request a Quote</option>
                            <option>Technical Support</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Message</label>
                        <textarea rows="4" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-brand-accent/50 focus:border-brand-accent outline-none transition-all resize-none"></textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-brand-dark text-white py-4 rounded-xl font-bold hover:bg-brand-light hover:shadow-lg hover:shadow-brand-accent/20 transition-all duration-300 transform hover:-translate-y-1">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="footer"></div>
    <script src="components.js"></script>
</body>
</html>
